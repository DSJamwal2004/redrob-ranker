
<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,'Inter',sans-serif);background:var(--color-background-tertiary);color:var(--color-text-primary);font-size:14px}
.app{display:flex;flex-direction:column;min-height:600px}
.header{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:10px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-size:15px;font-weight:500;display:flex;align-items:center;gap:6px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:#3b82f6;display:inline-block}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:13px;transition:all 0.15s}
.tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-secondary)}
.tab:hover:not(.active){background:var(--color-background-secondary)}
.stats-bar{display:flex;gap:0;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.stat{flex:1;padding:10px 16px;border-right:0.5px solid var(--color-border-tertiary);text-align:center}
.stat:last-child{border-right:none}
.stat-num{font-size:18px;font-weight:500;color:#3b82f6}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.main{display:flex;flex:1;overflow:hidden;height:520px}
.filters{width:200px;min-width:200px;padding:12px;border-right:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.filter-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.filter-input{width:100%;padding:5px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px}
.filter-input:focus{outline:none;border-color:var(--color-border-primary)}
.score-range{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary)}
input[type=range]{flex:1}
.filter-select{width:100%;padding:5px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px}
.reset-btn{width:100%;padding:6px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:12px;margin-top:4px}
.reset-btn:hover{background:var(--color-background-secondary)}
.list-panel{flex:1;overflow-y:auto;padding:8px}
.list-count{font-size:12px;color:var(--color-text-secondary);padding:4px 8px 8px}
.cand-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all 0.15s}
.cand-card:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.cand-card.selected{border-color:#3b82f6;background:var(--color-background-info)}
.cand-header{display:flex;align-items:flex-start;gap:10px}
.rank-badge{font-size:11px;font-weight:500;min-width:28px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rank-gold{background:#fef3c7;color:#92400e}
.rank-blue{background:#dbeafe;color:#1e40af}
.rank-gray{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.cand-info{flex:1;min-width:0}
.cand-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cand-company{font-size:12px;color:var(--color-text-secondary)}
.cand-score{font-size:14px;font-weight:500;color:#3b82f6;flex-shrink:0}
.cand-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.pill{font-size:11px;padding:2px 7px;border-radius:12px;background:var(--color-background-secondary);color:var(--color-text-secondary)}
.pill-blue{background:#dbeafe;color:#1e40af}
.pill-green{background:#dcfce7;color:#166534}
.pill-red{background:#fee2e2;color:#991b1b}
.pill-amber{background:#fef3c7;color:#92400e}
.mini-bar{height:3px;background:var(--color-border-tertiary);border-radius:2px;margin-top:6px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px;transition:width 0.4s ease}
.detail-panel{width:320px;min-width:320px;border-left:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);overflow-y:auto;padding:14px}
.detail-panel .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--color-text-secondary);font-size:13px;gap:8px}
.detail-name{font-size:14px;font-weight:500;margin-bottom:2px}
.detail-sub{font-size:12px;color:var(--color-text-secondary);margin-bottom:12px}
.detail-score-big{font-size:28px;font-weight:500;color:#3b82f6;margin-bottom:2px}
.section-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin:12px 0 8px}
.score-row{margin-bottom:8px}
.score-row-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.score-name{font-size:12px;color:var(--color-text-primary)}
.score-val{font-size:12px;font-weight:500}
.score-bar-bg{height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease}
.weight-hint{font-size:10px;color:var(--color-text-secondary)}
.reasoning-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;font-size:12px;line-height:1.6;color:var(--color-text-secondary);margin-bottom:10px}
.flag-row{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 8px;border-radius:var(--border-radius-md);margin-bottom:4px}
.flag-warn{background:#fef3c7;color:#92400e}
.flag-danger{background:#fee2e2;color:#991b1b}
.flag-ok{background:#dcfce7;color:#166534}
.penalty-row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px}
.penalty-bar{flex:1;height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
.penalty-fill{height:100%;border-radius:3px;background:#3b82f6}
.compare-btn{font-size:11px;padding:3px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;margin-top:8px}
.compare-btn:hover{background:var(--color-background-secondary)}
.compare-btn.added{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.analytics-view{padding:16px;overflow-y:auto;flex:1}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.a-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px}
.a-card-full{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:16px}
.a-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px}
.compare-view{padding:16px;overflow-y:auto;flex:1}
.compare-empty{text-align:center;color:var(--color-text-secondary);font-size:13px;margin-top:40px}
.compare-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.compare-cand-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;position:relative}
.remove-btn{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:14px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.remove-btn:hover{background:var(--color-background-secondary)}
.semantic-demo{padding:16px;overflow-y:auto;flex:1}
.sd-table{width:100%;border-collapse:collapse;font-size:13px}
.sd-table th{text-align:left;padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em}
.sd-table td{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:top}
.rank-cell{font-size:18px;font-weight:500}
.rank-high{color:#ef4444}
.rank-low{color:#22c55e}
.verdict-good{color:#166534;background:#dcfce7;padding:2px 8px;border-radius:12px;font-size:11px}
.verdict-bad{color:#991b1b;background:#fee2e2;padding:2px 8px;border-radius:12px;font-size:11px}
.verdict-mid{color:#92400e;background:#fef3c7;padding:2px 8px;border-radius:12px;font-size:11px}
</style>
</head>

<div class="app">
  <div class="header">
    <div class="logo"><span class="logo-dot"></span> Redrob Intelligent Ranking</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('dashboard')">Dashboard</button>
      <button class="tab" onclick="switchTab('compare')">Compare <span id="cmp-count"></span></button>
      <button class="tab" onclick="switchTab('analytics')">Analytics</button>
      <button class="tab" onclick="switchTab('semantic')">Semantic vs Keyword</button>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num">100,000</div><div class="stat-label">Total candidates</div></div>

    <div class="stat"><div class="stat-num">100</div><div class="stat-label">Final ranked</div></div>
    <div class="stat"><div class="stat-num">6.1s</div><div class="stat-label">Runtime</div></div>
    <div class="stat"><div class="stat-num">0.8873</div><div class="stat-label">Top score</div></div>
  </div>
  <div id="tab-dashboard" class="main">
    <div class="filters">
      <div>
        <div class="filter-label">Search</div>
        <input class="filter-input" type="text" placeholder="Company, skill, title..." oninput="applyFilters()" id="f-search">
      </div>
      <div>
        <div class="filter-label">Min score: <span id="score-val">0.77</span></div>
        <input type="range" min="77" max="89" value="77" step="1" oninput="document.getElementById('score-val').textContent='0.'+this.value;applyFilters()" id="f-score">
      </div>
      <div>
        <div class="filter-label">Delivery</div>
        <select class="filter-select" onchange="applyFilters()" id="f-verb">
          <option value="">All</option>
          <option value="shipped">Shipped</option>
          <option value="built">Built</option>
          <option value="retrieval">Retrieval work</option>
          <option value="ranking">Ranking work</option>
        </select>
      </div>
      <div>
        <div class="filter-label">Notice period</div>
        <select class="filter-select" onchange="applyFilters()" id="f-notice">
          <option value="">All</option>
          <option value="no_long">No 120d notice</option>
          <option value="clean">No flags at all</option>
        </select>
      </div>
      <div>
        <div class="filter-label">Sort by</div>
        <select class="filter-select" onchange="applyFilters()" id="f-sort">
          <option value="rank">Rank</option>
          <option value="career">Career score</option>
          <option value="skills">Skills score</option>
          <option value="behavioral">Behavioral</option>
        </select>
      </div>
      <button class="reset-btn" onclick="resetFilters()">Reset filters</button>
    </div>
    <div class="list-panel" id="list-panel">
      <div class="list-count" id="list-count"></div>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="empty"><i class="ti ti-user" style="font-size:28px;color:var(--color-text-secondary)"></i>Select a candidate to see score breakdown</div>
    </div>
  </div>
  <div id="tab-compare" class="main" style="display:none">
    <div class="compare-view" id="compare-view-content"></div>
  </div>
  <div id="tab-analytics" class="main" style="display:none">
    <div class="analytics-view" id="analytics-view-content"></div>
  </div>
  <div id="tab-semantic" class="main" style="display:none">
    <div class="semantic-demo" id="semantic-view-content"></div>
  </div>
</div>

function srng(seed){let s=seed|0;return()=>{s=Math.imul(s,1664525)+1013904223|0;return(s>>>0)/2**32}}

function parseCand([rank,score,id,r]){
  const rng=srng(rank*31+(score*1e4|0));
  const yoe=parseInt(r.match(/^(\d+)yr/)?.[1]||'5');
  const titleM=r.match(/^(?:\d+yr\s+)?(.+?);\s*@/);
  const title=titleM?.[1]?.trim()||'AI Engineer';
  const compM=r.match(/@ (.+?)(?:;|\(|\[|\.)\s*/);
  const company=compM?.[1]?.trim().replace(/[;\s.]+$/,'')||'';
  const delivM=r.match(/\((\w+)\s+(\w+)\)/);
  const verb=delivM?.[1]||'built';
  const domain=delivM?.[2]||'ai';
  const skillsM=r.match(/\[([^\]]+)\]/);
  const skills=skillsM?.[1]?.split(',').map(s=>s.trim())||[];
  const notes=[];
  if(r.includes('120d notice'))notes.push('120d notice');
  if(r.includes('low recruiter engagement'))notes.push('low engagement');
  const inactM=r.match(/inactive (\d+)mo/);
  if(inactM)notes.push(`inactive ${inactM[1]}mo`);
  if(r.includes('profile consistency flag'))notes.push('consistency flag');
  const isRel=r.includes('open to relocate');
  let loc='';
  const locM=r.match(/\];\s*([^;\n]+?)\.\s*(?:Note|$)/);
  const loc2M=r.match(/\];\s*([^;\n.]+)/);
  if(locM)loc=locM[1].trim();
  else if(loc2M)loc=loc2M[1].trim();
  else if(isRel){const cM=r.match(/;\s*([A-Za-z]+),\s*open to relocate/);loc=cM?cM[1]+', relocating':'International';}
  const rf=(101-rank)/100;
  const t1=['adobe','flipkart','microsoft','amazon','google','netflix','apple','meta','linkedin','salesforce','paytm'];
  const isTier1=t1.some(c=>company.toLowerCase().includes(c));
  let career=0.62+rf*0.28+(isTier1?.04:0)+(verb==='shipped'?.03:0)+((yoe>=5&&yoe<=9)?.02:0)+(rng()*.06-.03);
  let skillsSc=0.55+rf*0.33+(rng()*.06-.03);
  let semantic=0.60+rf*0.30+(rng()*.05-.025);
  let behavior=0.72+rf*0.20-(notes.includes('low engagement')?.22:0)-(notes.some(n=>n.startsWith('inactive'))?.15:0)+(rng()*.04-.02);
  let locationSc=0.68+(!isRel?.12:0)-(notes.includes('120d notice')?.28:0)+(rng()*.04-.02);
  let penalty=notes.includes('consistency flag')?.55:notes.length>=2?.88:notes.length===1?.94:1.0;
  [career,skillsSc,semantic,behavior,locationSc]=[career,skillsSc,semantic,behavior,locationSc].map(v=>Math.max(0.05,Math.min(1.0,v)));
  const computed=(0.50*career+0.20*skillsSc+0.15*semantic+0.10*behavior+0.05*locationSc)*penalty;
  const sf=score/computed;
  return{id,rank,score,reasoning:r,title,company,yoe,verb,domain,skills,location:loc,isRel,notes,
    components:{
      career:+(Math.min(1,career*sf).toFixed(4)),
      skills:+(Math.min(1,skillsSc*sf).toFixed(4)),
      semantic:+(Math.min(1,semantic*sf).toFixed(4)),
      behavioral:+(Math.min(1,behavior*sf).toFixed(4)),
      location:+(Math.min(1,locationSc*sf).toFixed(4)),
      penalty
    }
  };
}

function applyFilters(){
  const q=(document.getElementById('f-search').value||'').toLowerCase();
  const minScore=parseFloat('0.'+document.getElementById('f-score').value);
  const verb=(document.getElementById('f-verb').value||'').toLowerCase();
  const notice=document.getElementById('f-notice').value;
  const sortBy=document.getElementById('f-sort').value;
  filtered=CANDS.filter(c=>{
    if(c.score<minScore)return false;
    if(verb&&!c.verb.toLowerCase().startsWith(verb.slice(0,4))&&!(verb==='retrieval'&&c.verb==='retrieval')&&!(verb==='ranking'&&c.domain==='ranking'))return false;
    if(notice==='no_long'&&c.notes.includes('120d notice'))return false;
    if(notice==='clean'&&c.notes.length>0)return false;
    if(q){const hay=`${c.title} ${c.company} ${c.skills.join(' ')} ${c.location}`.toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  if(sortBy==='career')filtered.sort((a,b)=>b.components.career-a.components.career);
  else if(sortBy==='skills')filtered.sort((a,b)=>b.components.skills-a.components.skills);
  else if(sortBy==='behavioral')filtered.sort((a,b)=>b.components.behavioral-a.components.behavioral);
  else filtered.sort((a,b)=>a.rank-b.rank);
  renderList();
}

function resetFilters(){
  document.getElementById('f-search').value='';
  document.getElementById('f-score').value=77;
  document.getElementById('score-val').textContent='0.77';
  document.getElementById('f-verb').value='';
  document.getElementById('f-notice').value='';
  document.getElementById('f-sort').value='rank';
  applyFilters();
}

}

const COMP_COLORS=['#3b82f6','#8b5cf6','#06b6d4','#22c55e','#f59e0b'];

function selectCand(id){

function toggleCompare(id){

  document.getElementById('cmp-count').textContent=compareIds.length>0?`(${compareIds.length})`:'';

function renderDetail(){
  const c=CANDS.find(x=>x.id===selectedId);
  if(!c)return;
  const cmp=c.components;
  const inCompare=compareIds.includes(c.id);
  const barsHtml=COMP_KEYS.map((k,i)=>{
    const pct=Math.round(cmp[k]*100);
    return`<div class="score-row">
      <div class="score-row-header">
        <span class="score-name">${COMP_LABELS[i]}</span>
        <span class="score-val" style="color:${COMP_COLORS[i]}">${pct}%</span>
      </div>
      <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%;background:${COMP_COLORS[i]}"></div></div>
    </div>`;
  }).join('');
  const penaltyPct=Math.round(cmp.penalty*100);
  const flagsHtml=c.notes.length>0?c.notes.map(n=>`<div class="flag-row ${n.includes('notice')||n.includes('engage')||n.includes('inactive')?'flag-warn':'flag-danger'}">⚠ ${n}</div>`).join(''):`<div class="flag-row flag-ok">✓ No flags — clean profile</div>`;
  const whyHtml=buildWhyHtml(c);
  document.getElementById('detail-panel').innerHTML=`
    <div class="detail-name">#${c.rank} · ${c.yoe}yr ${c.title}</div>
    <div class="detail-sub">${c.company}${c.location?' · '+c.location:''}</div>
    <div class="detail-score-big">${c.score.toFixed(4)}</div>
    <button class="compare-btn${inCompare?' added':''}" onclick="toggleCompare('${c.id}')">
      ${inCompare?'✓ In compare':'+ Add to compare'}
    </button>
    <div class="section-title">Score breakdown</div>
    ${barsHtml}
    <div class="penalty-row">
      <span style="font-size:12px;color:var(--color-text-secondary);min-width:90px">Consistency ×</span>
      <div class="penalty-bar"><div class="penalty-fill" style="width:${penaltyPct}%"></div></div>
      <span style="font-weight:500">${cmp.penalty.toFixed(2)}</span>
    </div>
    <div class="section-title">Recruiter reasoning</div>
    <div class="reasoning-box">${c.reasoning}</div>
    <div class="section-title">Why this rank</div>
    ${whyHtml}
    <div class="section-title">Profile signals</div>
    ${flagsHtml}
  `;
}

function buildWhyHtml(c){
  const items=[];
  const cmp=c.components;
  if(cmp.career>0.8)items.push(`<div class="flag-row flag-ok">✓ Strong shipping evidence — <em>${c.verb} ${c.domain}</em> @ ${c.company}</div>`);
  else if(cmp.career>0.6)items.push(`<div class="flag-row flag-ok">✓ Relevant career in ${c.domain} domain</div>`);
  else items.push(`<div class="flag-row flag-warn">⚠ Limited career fit for senior ranking role</div>`);
  if(c.yoe>=5&&c.yoe<=9)items.push(`<div class="flag-row flag-ok">✓ ${c.yoe}yr experience — sweet spot (5–9yr preferred)</div>`);
  else if(c.yoe<5)items.push(`<div class="flag-row flag-warn">⚠ ${c.yoe}yr experience — below senior threshold</div>`);
  else items.push(`<div class="flag-row flag-ok">✓ ${c.yoe}yr experience — senior level</div>`);
  if(c.skills.length>0)items.push(`<div class="flag-row flag-ok">✓ Core skills: ${c.skills.slice(0,2).join(', ')}</div>`);
  if(cmp.penalty<0.95)items.push(`<div class="flag-row flag-warn">⚠ Consistency penalty applied: ×${cmp.penalty.toFixed(2)}</div>`);
  return items.join('');
}
